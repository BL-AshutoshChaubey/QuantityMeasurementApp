# Railway Deployment Trigger - 2026-05-14
server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: 
              - "http://localhost:5173"
              - "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: measurement-service
          uri: lb://measurement-service
          predicates:
            - Path=/api/v1/measurements/**
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/auth/**, /oauth2/**, /login/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://quantitymeasurementapp.railway.internal:8080/eureka/}
